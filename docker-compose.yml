services:
  nginx:
    image: nginx:alpine
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - site
      - api

  api:
    container_name: musicproject-api
    build: .
    environment:
      - ENV=prod
    env_file:
      - config/.env.prod
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: musicproject-db
    build: database
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: musicproject
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: musicproject
    healthcheck:
      test: ["CMD", "pg_isready", "--username=musicproject"]
      interval: 1s
      timeout: 3s
      retries: 15
