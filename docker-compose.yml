services:
  # nginx:
  #   image: nginx:1-alpine
  #   ports:
  #     - 80:80
  #     - 443:443
  #   volumes:
  #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
  #   depends_on:
  #     - api

  api:
    container_name: musicproject-api
    build: .
    ports:
      - 8081:8081
    # environment:
    #   - ENV=prod
    env_file:
      - config/.env.dev

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:alpine
    container_name: musicproject-db
    ports:
      - 5432:5432

    environment:
      POSTGRES_USER: musicproject
      POSTGRES_PASSWORD: admin

    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

    healthcheck:
      test: ["CMD", "pg_isready", "--username=musicproject"]
      interval: 1s
      timeout: 3s
      retries: 15
  redis:
    image: redis:alpine
