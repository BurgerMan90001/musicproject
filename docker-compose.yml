  api:
    container_name: musicproject-api
    build: .
    env_file:
      - .env.dev
    ports:
      - 8081:8081

    depends_on:
      # keycloak:
      #   condition: service_started
      db:
        condition: service_healthy

  db:
    image: postgres:alpine
    container_name: musicproject-db
    ports:
      - 5432:5432
    restart: always
    environment:
      POSTGRES_USER: musicproject
      POSTGRES_PASSWORD: admin

    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./database/test.sql:/docker-entrypoint-initdb.d/test.sql:ro

    healthcheck:
      test: ["CMD", "pg_isready", "--username=musicproject"]
      interval: 1s
      timeout: 3s
      retries: 15
