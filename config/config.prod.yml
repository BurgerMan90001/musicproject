api:
  port: 8081
  host: localhost
  version: "1"

auth:
  jwt:
    issuer: spume
    audience:
      - api

  oauth:
    google:
      redirectUrl: http://localhost:8081/v1/auth/google/redirect
      scopes:
        - https://www.googleapis.com/auth/userinfo.email
        - https://www.googleapis.com/auth/userinfo.profile

upload:
  #store: aws
  region: northamerica-northeast1
  bucket: spume-musicproject
  encoder:
    logging: false
    enabled: false

middleware:
  logger: true
  ratelimit: false

repository:
  postgres:
    image: postgres:alpine
