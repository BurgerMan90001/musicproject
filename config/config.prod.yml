api:
  port: 8081
  host: localhost
  version: "1"

auth:
  jwt:
    issuer: spume
    audience:
      - api

  oauth:
    google:
      redirectUrl: http://localhost:8081/v1/auth/google/redirect
      scopes:
        - https://www.googleapis.com/auth/userinfo.email
        - https://www.googleapis.com/auth/userinfo.profile

upload:
  store: aws
  region: us-east-1
  bucket: spume-musicproject-634220481321-us-east-1-an
  encoder:
    logging: false
    enabled: false
  
    

middleware:
  logger: false
  ratelimit: false

repository:
  postgres:
    image: postgres:alpine
